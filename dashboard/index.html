<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Realtime Classroom Attention Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>Classroom Attention</h1>
        <p id="status">Connecting to realtime stream...</p>
      </section>

      <section class="panel">
        <h2>Current Students</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Attention</th>
              <th>Loss Prob.</th>
              <th>Emotion</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="students-body"></tbody>
        </table>
      </section>

      <section class="panel">
        <h2>Latest Alerts</h2>
        <ul id="alerts"></ul>
      </section>
    </main>
    <script src="./main.js"></script>
  </body>
  </html>
